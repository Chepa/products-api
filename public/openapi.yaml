openapi: 3.0.3
info:
  title: Product API
  description: |
    REST API каталога товаров (Phalcon). Авторизация — `Authorization: Bearer <token>`.
    Исключение: `POST /api/v1/tokens/generate` вызывается без Bearer; остальные эндпоинты требуют валидный токен из БД.
  version: "1.0.0"

servers:
  - url: /

tags:
  - name: Tokens
    description: Управление API-токенами
  - name: Products
    description: Товары и агрегаты по наличию
  - name: Categories
    description: Иерархия категорий

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Plain-токен из ответа `POST /tokens/generate` или сид `dev-api-token` после migrate.

  schemas:
    ApiError:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [message, type]
          properties:
            message:
              type: string
            type:
              type: string
              enum: [auth, validation, not_found, conflict, server, rate_limit]
            details:
              type: object
              additionalProperties:
                type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parent_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    CategoryTreeNode:
      allOf:
        - $ref: "#/components/schemas/Category"
        - type: object
          properties:
            children:
              type: array
              items:
                $ref: "#/components/schemas/CategoryTreeNode"

    ProductCategory:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parent_id:
          type: integer
          nullable: true

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        content:
          type: string
          nullable: true
        price:
          type: string
          description: Десятичная строка с двумя знаками
        category:
          $ref: "#/components/schemas/ProductCategory"
        in_stock:
          type: boolean
        quantity:
          type: integer
        created_at:
          type: string
          nullable: true
        updated_at:
          type: string
          nullable: true

    Pagination:
      type: object
      properties:
        total:
          type: integer
        count:
          type: integer
        per_page:
          type: integer
        current_page:
          type: integer
        total_pages:
          type: integer

    Aggregates:
      type: object
      description: |
        По тем же правилам фильтра **категории** (поддерево по slug), но только строки с `in_stock = true`.
        Пользовательский query `in_stock` на список товаров на агрегаты не влияет.
      properties:
        in_stock_count:
          type: integer
        in_stock_total_value:
          type: string
          description: SUM(price * quantity) для in_stock = 1

    TokenListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        created_at:
          type: string
          nullable: true

    TokenGenerateData:
      type: object
      properties:
        id:
          type: integer
        token:
          type: string
          description: Plain-секрет (только в этом ответе)
        name:
          type: string
          nullable: true

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
          nullable: true
        price:
          type: number
        quantity:
          type: integer
        category_slug:
          type: string
        in_stock:
          type: integer
          enum: [0, 1]

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        parent_id:
          type: integer
          nullable: true

  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: integer

paths:
  /api/v1/tokens/generate:
    post:
      tags: [Tokens]
      summary: Создать новый API-токен
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Токен создан
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/TokenGenerateData"
        "400":
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/tokens:
    get:
      tags: [Tokens]
      summary: Список токенов (без plain-секрета)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TokenListItem"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/tokens/{id}:
    delete:
      tags: [Tokens]
      summary: Удалить токен
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "410":
          description: Токен удалён
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/products:
    get:
      tags: [Products]
      summary: Список товаров с пагинацией и агрегатами
      parameters:
        - name: category
          in: query
          description: Slug категории; учитывается поддерево (все потомки)
          schema:
            type: string
        - name: in_stock
          in: query
          description: "1 — в наличии, 0 — нет"
          schema:
            type: integer
            enum: [0, 1]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
            maximum: 100
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [success, data, pagination, aggregates]
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
                  aggregates:
                    $ref: "#/components/schemas/Aggregates"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags: [Products]
      summary: Создать товар
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price, quantity, category_slug]
              properties:
                name:
                  type: string
                content:
                  type: string
                  nullable: true
                price:
                  type: number
                quantity:
                  type: integer
                  minimum: 0
                category_slug:
                  type: string
                in_stock:
                  type: integer
                  enum: [0, 1]
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Product"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/products/{id}:
    get:
      tags: [Products]
      summary: Товар по ID
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Product"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags: [Products]
      summary: Полное обновление товара
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Product"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      tags: [Products]
      summary: Частичное обновление товара
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Product"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags: [Products]
      summary: Удалить товар
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/categories:
    get:
      tags: [Categories]
      summary: Плоский список категорий
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags: [Categories]
      summary: Создать категорию или подкатегорию
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                slug:
                  type: string
                  description: Если не указан — генерируется из name
                parent_id:
                  type: integer
                  nullable: true
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Category"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/categories/tree:
    get:
      tags: [Categories]
      summary: Дерево категорий
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CategoryTreeNode"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/categories/{id}:
    get:
      tags: [Categories]
      summary: Категория по ID
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Category"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags: [Categories]
      summary: Обновить категорию
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Category"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      tags: [Categories]
      summary: Частичное обновление категории
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Category"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags: [Categories]
      summary: Удалить категорию (без детей и без товаров)
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Есть подкатегории или товары
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
